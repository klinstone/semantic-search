services:
  postgres:
    image: postgres:16-alpine
    container_name: semsearch-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: semsearch-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: semsearch-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    environment:
      # PostgreSQL
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      # Qdrant
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-document_chunks}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-intfloat/multilingual-e5-base}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-768}
      # Storage
      UPLOAD_DIR: /data/uploads
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
      # Сохраняем кэш моделей HuggingFace между пересозданиями контейнера.
      HF_HOME: /cache/huggingface
      # Прочее
      APP_ENV: ${APP_ENV:-development}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
      - ./data/uploads:/data/uploads
      # Кэш моделей HuggingFace (сохраняется при пересоздании контейнеров).
      - huggingface_cache:/cache/huggingface
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8000}:8000"
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    image: node:20-alpine
    container_name: semsearch-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      # Обязательно для отслеживания изменений файлов на bind mount в Windows/WSL2.
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_BACKEND_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      # Изолируем Linux node_modules от хоста Windows.
      - frontend_node_modules:/app/node_modules
    ports:
      - "127.0.0.1:5173:5173"

volumes:
  postgres_data:
    name: semsearch-postgres-data
  qdrant_data:
    name: semsearch-qdrant-data
  frontend_node_modules:
    name: semsearch-frontend-node-modules
  huggingface_cache:
    name: semsearch-huggingface-cache

networks:
  default:
    name: semsearch-network
