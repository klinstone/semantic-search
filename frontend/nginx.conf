server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API to the FastAPI backend service in docker-compose network.
    # MAX_UPLOAD_SIZE_MB in .env is 10, leaving 12M as a small headroom for
    # multipart overhead.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 12M;
        proxy_read_timeout 120s;
    }

    # Static asset caching
    location ~* \.(?:css|js|woff2?|ttf|svg|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
